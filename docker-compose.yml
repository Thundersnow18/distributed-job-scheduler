version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: scheduler
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      - PORT=5000
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/scheduler?schema=public
      - JWT_SECRET=super-secret-jwt-key
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    command: npm run start

  worker:
    build:
      context: ./backend
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/scheduler?schema=public
    depends_on:
      db:
        condition: service_healthy
    command: npm run worker

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000/api
    depends_on:
      - backend

volumes:
  pgdata:
